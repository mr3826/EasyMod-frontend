apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: easymod-frontend
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/execution-environment: gen2
    spec:
      serviceAccountName: easymod-frontend-sa@gen-lang-client-0405487706.iam.gserviceaccount.com
      # Static file serving can handle many concurrent requests per instance
      containerConcurrency: 1000
      timeoutSeconds: 60
      containers:
        - image: us-central1-docker.pkg.dev/gen-lang-client-0405487706/easymod-frontend/app:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
