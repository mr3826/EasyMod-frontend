name: Frontend Test Automation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-tests:
    name: Unit + E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run frontend unit tests
        # Exclude API domain integration tests — they hit localhost:3000 which
        # does not exist in CI. Those are covered by E2E tests against the real stack.
        run: |
          npm run test:unit -- \
            --passWithNoTests \
            --exclude 'src/api/domains/__tests__/**' \
            --exclude 'src/test/CSRFIntegration.test.tsx'

      - name: Run frontend E2E tests
        run: npm run test:e2e
        continue-on-error: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
