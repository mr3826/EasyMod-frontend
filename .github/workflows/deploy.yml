name: Deploy to AWS Amplify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_ENV: production
          VITE_META_APP_ID: ${{ secrets.VITE_META_APP_ID }}

      - name: Zip build output
        run: |
          cd dist
          zip -r ../dist.zip .
          cd ..

      - name: Deploy to Amplify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AMPLIFY_APP_ID: ${{ secrets.AMPLIFY_APP_ID }}
        run: |
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --output json)

          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')

          echo "Uploading build artifact..."
          curl -T dist.zip "$UPLOAD_URL"

          echo "Starting deployment (Job ID: $JOB_ID)..."
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-id "$JOB_ID"

          echo "Deployment triggered successfully."
