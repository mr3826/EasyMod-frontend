name: Deploy Frontend to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_META_APP_ID=${{ secrets.VITE_META_APP_ID }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_ENV=production
          tags: easymod-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tarball
        run: docker save easymod-frontend:latest | gzip > /tmp/frontend.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer image to droplet
        run: scp -i ~/.ssh/deploy_key /tmp/frontend.tar.gz root@${{ secrets.DO_HOST }}:/tmp/

      - name: Load and restart frontend on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            docker image prune -f || true
            docker container prune -f || true
            docker load < /tmp/frontend.tar.gz
            rm -f /tmp/frontend.tar.gz
            cd /opt/easymod
            export GHCR_IMAGE_FRONTEND="easymod-frontend:latest"
            export GHCR_IMAGE_BACKEND="$(docker inspect easymod-backend-1 --format='{{index .Config.Image}}' 2>/dev/null || echo ghcr.io/mr3826/easymod-backend:latest)"
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d frontend --no-build --pull never --force-recreate --remove-orphans
            for i in $(seq 1 12); do
              if docker exec easymod-frontend-1 wget -q -O /dev/null http://localhost:8080/health 2>/dev/null; then
                echo "Health check passed (attempt $i)"; break
              fi
              echo "Attempt $i: frontend not ready -- retrying in 5s..."
              sleep 5
              if [ "$i" = "12" ]; then echo "ERROR: Health check failed"; exit 1; fi
            done
            docker image prune -f
