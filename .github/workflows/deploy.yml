name: Deploy to AWS Amplify

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-main
  cancel-in-progress: true

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --passWithNoTests --maxWorkers=2

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Retrieve secrets from AWS Secrets Manager
        run: |
          # Get all secrets for Easy Moderator (stored in ap-south-1)
          SECRETS_JSON=$(aws secretsmanager get-secret-value \
            --secret-id "easymoderator/production" \
            --region ap-south-1 \
            --query SecretString \
            --output text)
          
          # Export secrets as environment variables
          echo "VITE_API_BASE_URL=$(echo $SECRETS_JSON | jq -r '.VITE_API_BASE_URL')" >> $GITHUB_ENV
          echo "VITE_META_APP_ID=$(echo $SECRETS_JSON | jq -r '.VITE_META_APP_ID')" >> $GITHUB_ENV
          echo "AMPLIFY_APP_ID=$(echo $SECRETS_JSON | jq -r '.AMPLIFY_APP_ID')" >> $GITHUB_ENV

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ env.VITE_API_BASE_URL }}
          VITE_ENV: production
          VITE_META_APP_ID: ${{ env.VITE_META_APP_ID }}

      - name: Zip build output
        run: |
          cd dist
          zip -r ../dist.zip .
          cd ..

      - name: Deploy to Amplify
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          AMPLIFY_APP_ID: ${{ env.AMPLIFY_APP_ID }}
        run: |
          DEPLOYMENT=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --output json)

          JOB_ID=$(echo "$DEPLOYMENT" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$DEPLOYMENT" | jq -r '.zipUploadUrl')

          echo "Uploading build artifact..."
          curl -T dist.zip "$UPLOAD_URL"

          echo "Starting deployment (Job ID: $JOB_ID)..."
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name main \
            --job-id "$JOB_ID"

          echo "Deployment triggered successfully."
