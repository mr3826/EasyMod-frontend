name: Deploy Frontend to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0405487706
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: easymod-frontend
  SERVICE_NAME: easymod-frontend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test:unit -- \
            --passWithNoTests \
            --exclude 'src/api/domains/__tests__/**' \
            --exclude 'src/test/CSRFIntegration.test.tsx' \
            --exclude 'src/test/Channels.test.tsx' \
            --exclude 'src/test/SignIn.test.tsx' \
            --exclude 'src/test/Subscription.test.tsx' \
            --exclude 'src/app/components/BusinessInfoForm.test.tsx'

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Docker image
        id: image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app
        run: |
          IMAGE_TAG="${IMAGE}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE}:latest"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }} \
            --build-arg VITE_META_APP_ID=${{ secrets.VITE_META_APP_ID }} \
            --build-arg VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }} \
            --build-arg VITE_ENV=production \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --tag "$IMAGE_TAG" \
            --tag "$IMAGE_LATEST" \
            --push \
            .

          # Move cache to avoid ever-growing cache
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ steps.image.outputs.image_tag }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --quiet

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")
          echo "Deployed to: $SERVICE_URL"

          for i in $(seq 1 10); do
            STATUS=$(curl -sf "${SERVICE_URL}/health" -o /dev/null -w "%{http_code}" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              break
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s..."
            sleep 5
            if [ "$i" = "10" ]; then
              echo "Health check failed after 50s"
              exit 1
            fi
          done
