name: Deploy Frontend to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_META_APP_ID=${{ secrets.VITE_META_APP_ID }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_ENV=production
          tags: easymod-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image to tarball
        run: docker save easymod-frontend:latest | gzip > /tmp/frontend.tar.gz

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DO_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Transfer image to droplet
        run: scp -i ~/.ssh/deploy_key /tmp/frontend.tar.gz root@${{ secrets.DO_HOST }}:/tmp/

      - name: Load and restart frontend on droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            set -e
            docker image prune -f || true
            docker container prune -f || true
            docker load < /tmp/frontend.tar.gz
            rm -f /tmp/frontend.tar.gz
            cd /opt/easymod
            export GHCR_IMAGE_FRONTEND="easymod-frontend:latest"
            export GHCR_IMAGE_BACKEND="$(docker inspect easymod-backend-1 --format='{{index .Config.Image}}' 2>/dev/null || echo ghcr.io/mr3826/easymod-backend:latest)"
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d frontend --no-build --pull never --force-recreate --remove-orphans
            CID=$(docker compose --env-file .env.prod -f docker-compose.prod.yml ps -q frontend)
            echo "frontend container id: $CID"
            docker ps --filter "id=$CID" --format 'status: {{.Status}} names: {{.Names}}'
            HEALTHY=0
            for i in $(seq 1 18); do
              IP=$(docker inspect -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' "$CID" 2>/dev/null)
              if [ -n "$IP" ] && curl -sf "http://$IP:8080/health" -o /dev/null; then HEALTHY=1; fi
              if [ "$HEALTHY" = "0" ] && docker exec "$CID" wget -q -O /dev/null http://127.0.0.1:8080/health 2>/dev/null; then HEALTHY=1; fi
              if [ "$HEALTHY" = "1" ]; then echo "Health check passed (attempt $i)"; break; fi
              echo "Attempt $i: frontend not ready (ip=$IP) -- retrying in 5s..."
              sleep 5
            done
            if [ "$HEALTHY" = "0" ]; then
              echo "ERROR: Health check failed"
              docker logs --tail 50 "$CID" 2>&1 || true
              exit 1
            fi
            docker image prune -f
