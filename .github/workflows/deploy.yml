name: Deploy Frontend to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/easymod-frontend

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: |
          npm run test:unit -- \
            --passWithNoTests \
            --exclude 'src/api/domains/__tests__/**' \
            --exclude 'src/test/CSRFIntegration.test.tsx' \
            --exclude 'src/test/Channels.test.tsx' \
            --exclude 'src/test/SignIn.test.tsx' \
            --exclude 'src/test/Subscription.test.tsx' \
            --exclude 'src/app/components/BusinessInfoForm.test.tsx' \
            --exclude 'src/app/components/Products.test.tsx' \
            --exclude 'src/app/components/__tests__/PaymentSettings.test.tsx'

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          SHORT="${GITHUB_SHA::8}"
          echo "image_tag=${{ env.GHCR_IMAGE }}:${SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_META_APP_ID=${{ secrets.VITE_META_APP_ID }}
            VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
            VITE_ENV=production
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ env.GHCR_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.GHCR_IMAGE }}:buildcache,mode=max

      - name: Deploy to DO Droplet
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: root
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          timeout: 120s
          envs: GHCR_IMAGE,IMAGE_TAG,GH_ACTOR,GH_TOKEN
          script: |
            set -e
            echo "$GH_TOKEN" | docker login ghcr.io -u "$GH_ACTOR" --password-stdin

            echo "Pulling frontend: $IMAGE_TAG"
            docker pull "$IMAGE_TAG"
            docker tag "$IMAGE_TAG" "$GHCR_IMAGE:latest"

            cd /opt/easymod
            export GHCR_IMAGE_FRONTEND="$GHCR_IMAGE:latest"
            export GHCR_IMAGE_BACKEND="${GHCR_IMAGE_BACKEND:-$(docker inspect easymod-backend-1 --format='{{index .Config.Image}}' 2>/dev/null || echo ghcr.io/mr3826/easymod-backend:latest)}"
            docker compose -f docker-compose.prod.yml up -d frontend --no-build --remove-orphans

            for i in $(seq 1 12); do
              STATUS=$(curl -sf http://localhost:8080/health -o /dev/null -w "%{http_code}" || echo "000")
              if [ "$STATUS" = "200" ]; then echo "Health check passed (attempt $i)"; break; fi
              echo "Attempt $i: $STATUS — retrying in 5s..."
              sleep 5
              if [ "$i" = "12" ]; then echo "ERROR: Health check failed"; exit 1; fi
            done

            docker image prune -f
        env:
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          GH_ACTOR: ${{ github.actor }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
