name: Deploy Frontend to GCP Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

# Required for Workload Identity Federation
permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gen-lang-client-0405487706
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev
  REPOSITORY: easymod-frontend
  SERVICE_NAME: easymod-frontend
  SERVICE_ACCOUNT: easymod-frontend-sa@gen-lang-client-0405487706.iam.gserviceaccount.com

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test -- --passWithNoTests --maxWorkers=2

  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: github-actions-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and push Docker image
        id: image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/app
        run: |
          IMAGE_TAG="${IMAGE}:${{ github.sha }}"
          IMAGE_LATEST="${IMAGE}:latest"

          docker build \
            --build-arg VITE_API_BASE_URL=https://api.easymod.tech \
            --build-arg VITE_META_APP_ID=${{ secrets.VITE_META_APP_ID }} \
            --build-arg VITE_ENV=production \
            -t "$IMAGE_TAG" \
            -t "$IMAGE_LATEST" \
            .

          docker push "$IMAGE_TAG"
          docker push "$IMAGE_LATEST"

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image="${{ steps.image.outputs.image_tag }}" \
            --region=${{ env.REGION }} \
            --service-account=${{ env.SERVICE_ACCOUNT }} \
            --min-instances=1 \
            --max-instances=5 \
            --concurrency=1000 \
            --cpu=1 \
            --memory=512Mi \
            --timeout=60 \
            --port=8080 \
            --platform=managed \
            --allow-unauthenticated

      - name: Health check
        run: |
          FRONTEND_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.REGION }} \
            --format="value(status.url)")

          STATUS=$(curl -sf "${FRONTEND_URL}/healthz" -o /dev/null -w "%{http_code}" || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Frontend health check passed"
          else
            echo "ERROR: Frontend health check failed (status: $STATUS)"
            exit 1
          fi
