server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ───────────────────────────────────────────────────
    # NOTE: nginx does NOT inherit parent add_header directives into child
    # location blocks that define their own add_header.  Every location block
    # that adds at least one header must repeat the full set.  Shared headers
    # are extracted into a snippet file below (headers-common.conf) and
    # included in each relevant block.
    #
    # Common security headers (repeated via include in each location below):
    #   X-Frame-Options, X-Content-Type-Options, Referrer-Policy,
    #   Permissions-Policy, HSTS, CSP.
    #
    # Do NOT add add_header here at server level — they would only apply to
    # responses from location blocks that add no headers of their own.

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 1000;

    # ── Static Asset Caching (hashed filenames → immutable) ───────────────
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Security headers must be repeated here (nginx add_header inheritance rule)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # CSP for static assets: conservative — assets don't initiate connections
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.easymod.tech https://*.googleapis.com https://*.google.com https://o4511271250624512.ingest.us.sentry.io; frame-src https://www.facebook.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        # Security headers must be repeated here
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.easymod.tech https://*.googleapis.com https://*.google.com https://o4511271250624512.ingest.us.sentry.io; frame-src https://www.facebook.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        access_log off;
    }

    # ── Enhanced Health Checks ───────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","version":"$arg_version"}\n';
        add_header Content-Type application/json;
    }

    location /health/detailed {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","server":"nginx","version":"$arg_version","uptime":"$time_local"}\n';
        add_header Content-Type application/json;
    }

    location /health/ready {
        access_log off;
        try_files /index.html @not_ready;
        return 200 '{"status":"ready","timestamp":"$time_iso8601"}\n';
        add_header Content-Type application/json;
    }

    location @not_ready {
        return 503 '{"status":"not_ready","timestamp":"$time_iso8601","error":"Static assets not available"}\n';
        add_header Content-Type application/json;
    }

    # ── SPA Fallback + HTML ─────────────────────────────────────────────────
    # Serves index.html for all routes (React Router client-side routing).
    # Cache-Control: no-cache so the browser always re-validates index.html
    # and picks up the new content-hashed bundle filenames after each deploy.
    # Security headers must be repeated here (nginx add_header inheritance rule).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        # Full CSP for the HTML document — connect-src MUST include api.easymod.tech
        # or the browser will block all XHR/fetch requests to the backend.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.easymod.tech https://*.googleapis.com https://*.google.com https://o4511271250624512.ingest.us.sentry.io; frame-src https://www.facebook.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    }
}
