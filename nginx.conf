server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # CSP: allow Meta SDK (connect.facebook.net), app API, and Google fonts/APIs
    # style-src: 'unsafe-inline' removed — Tailwind CSS 4 compiles to external files at build time.
    # script-src: 'unsafe-inline' retained pending Meta SDK integration testing.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://connect.facebook.net; style-src 'self' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.easymod.tech https://*.googleapis.com https://*.google.com; frame-src https://www.facebook.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;
    gzip_min_length 1000;

    # ── Static Asset Caching (hashed filenames → immutable) ───────────────
    location ~* \.(js|css|woff|woff2|ttf|eot|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Enhanced Health Checks ───────────────────────────────────────────────
    # /healthz is intercepted by Cloud Run infrastructure; use /health instead
    location /health {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","version":"$arg_version"}\n';
        add_header Content-Type application/json;
    }

    # Detailed health check with system info
    location /health/detailed {
        access_log off;
        return 200 '{"status":"healthy","timestamp":"$time_iso8601","server":"nginx","version":"$arg_version","uptime":"$time_local"}\n';
        add_header Content-Type application/json;
    }

    # Readiness probe - checks if static assets are available
    location /health/ready {
        access_log off;
        try_files /index.html @not_ready;
        return 200 '{"status":"ready","timestamp":"$time_iso8601"}\n';
        add_header Content-Type application/json;
    }

    location @not_ready {
        return 503 '{"status":"not_ready","timestamp":"$time_iso8601","error":"Static assets not available"}\n';
        add_header Content-Type application/json;
    }

    # ── HTML: never cache — always serve latest index.html so the browser
    #    picks up new content-hashed bundle filenames after each deploy.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ── SPA Fallback ───────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
